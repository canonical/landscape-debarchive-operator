type: charm

name: landscape-debarchive
title: Debarchive Operator

summary: Charm for installing and using debarchive with Landscape Server.
description: |
  Charm used for managing debarchive along with Landscape Server.

charm-libs:
  - lib: data_platform_libs.data_interfaces
    version: "0"

platforms:
  #ubuntu@22.04:amd64: TBD - Release for jammy as well?
  #ubuntu@22.04:arm64:
  ubuntu@24.04:amd64:
  ubuntu@24.04:arm64:

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv
    prime:
      - "-.ruff_cache"
      - "-.venv"
      - "-.pytest_cache"

requires:
  database:
    interface: postgresql_client
  landscape-server:
    interface: landscape-debarchive
    limit: 1

config:
  options:
    server-port:
      default: 8000
      type: int
      description: The port debarchive server will listen on.
