type: charm

name: landscape-debarchive
title: Debarchive Operator

summary: Charm for installing and using debarchive with Landscape Server.
description: |
  Charm used for managing debarchive along with Landscape Server.

charm-libs:
  - lib: data_platform_libs.data_interfaces
    version: "0"
  - lib: haproxy.haproxy_route
    version: "1"

platforms:
  ubuntu@24.04:amd64:
  ubuntu@24.04:arm64:

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv
    prime:
      - "-.ruff_cache"
      - "-.venv"
      - "-.pytest_cache"

requires:
  database:
    interface: postgresql_client
  debarchive-haproxy-route:
    interface: haproxy-route
    limit: 1
  landscape-server:
    interface: landscape-debarchive
    limit: 1

config:
  options:
    gateway-port:
      default: 8100
      type: int
      description: The debarchive server gateway port.
    log-level:
      default: info
      type: string
      description: Log level for debarchive. Valid options are debug, warn, error, info, trace, fatal.
    log-human-readable:
      default: false
      type: boolean
      description: Enable human-readable debarchive logging output.

actions:
  show-config:
    description: Show redacted debarchive snap configuration managed by the charm.
  check-health:
    description: Check whether the debarchive snap is installed and its services are active.
  show-version:
    description: Show the installed debarchive snap version information.
  restart-snap:
    description: Restart the debarchive snap services.
